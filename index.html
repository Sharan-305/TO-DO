<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, high-fashion Project Task Tracker application styled to match the Canva Project Tracker design.">
    <title>Project Task Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-decorations">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                    </svg>
                </span>
                <h1>TaskTracker</h1>
            </div>
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
                <!-- Sun Icon -->
                <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon Icon -->
                <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <main class="main-card">
            <!-- Project Tracker Header Gradient -->
            <div class="card-hero">
                <h2>Project Task Tracker</h2>
            </div>

            <!-- New Task Creator Form -->
            <form id="todo-form" class="todo-form">
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="Add a new project task..." required autocomplete="off" maxlength="120" aria-label="New task content">
                    <button type="submit" class="btn-primary" aria-label="Add Task">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Add Task</span>
                    </button>
                </div>
                
                <div class="meta-inputs">
                    <div class="meta-field">
                        <label for="todo-priority">Priority</label>
                        <select id="todo-priority">
                            <option value="low" selected>Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="meta-field">
                        <label for="todo-category">Project</label>
                        <select id="todo-category">
                            <option value="Summer Campaign" selected>☀️ Summer Campaign</option>
                            <option value="Winter Campaign">❄️ Winter Campaign</option>
                            <option value="Product Launch">🚀 Product Launch</option>
                            <option value="Marketing">📈 Marketing</option>
                            <option value="Operations">⚙️ Operations</option>
                        </select>
                    </div>
                </div>
            </form>

            <!-- Search, Sort & Controls Panel -->
            <div class="controls-panel">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search task tracker..." aria-label="Search tasks">
                </div>

                <div class="sort-wrapper">
                    <label for="sort-select" class="visually-hidden">Sort by</label>
                    <select id="sort-select" aria-label="Sort options">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="priority-desc">High Priority First</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>
            </div>

            <!-- Filter tabs -->
            <nav class="filters-nav">
                <button type="button" class="filter-tab active" data-filter="all">All Tasks</button>
                <button type="button" class="filter-tab" data-filter="active">In Progress</button>
                <button type="button" class="filter-tab" data-filter="completed">Completed</button>
                <div class="active-indicator"></div>
            </nav>

            <!-- Tracker Spreadsheet Table Layout -->
            <div class="tracker-table-container">
                <div class="tracker-table-header">
                    <span class="col-task">Task</span>
                    <span class="col-project">Project</span>
                    <span class="col-priority">Priority</span>
                    <span class="col-date">Date</span>
                    <span class="col-status">Status</span>
                    <span class="col-actions">Actions</span>
                </div>

                <div class="list-wrapper">
                    <ul id="todo-list" class="todo-list tracker-table-body">
                        <!-- Spreadsheet rows injected here dynamically -->
                    </ul>

                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <h3>No tracker records</h3>
                        <p>Create a task or change filters to populate the tracker sheet.</p>
                    </div>
                </div>
            </div>

            <!-- Card Footer -->
            <footer class="card-footer">
                <span id="items-left" class="items-count">0 items left</span>
                
                <div class="progress-container">
                    <span class="progress-text">0% Done</span>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
                    </div>
                </div>

                <button id="clear-completed" class="btn-link">Clear Completed</button>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
